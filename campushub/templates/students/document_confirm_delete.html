{% extends 'base.html' %}
{% block title %}Delete Document | CampusHub{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center py-5">
                <h2 class="text-danger mb-3">Delete Document</h2>
                <p class="lead">Delete <strong>{{ doc.title }}</strong>?</p>
                <p class="text-muted small">{{ doc.filename }} ({{ doc.size_display }})</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'students:admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
